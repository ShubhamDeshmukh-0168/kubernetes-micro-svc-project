apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-fashion
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ShubhamDeshmukh-0168/kubernetes-micro-svc-project.git
    path: frontend/fashion
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
