apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-deployment
  labels:
    app: fashion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fashion
  template:
    metadata:
      labels:
        app: fashion
    spec:
      containers:
      - name: fashion
        image: 876042377013.dkr.ecr.us-west-2.amazonaws.com/shopping-site-fashion:133adba830df3a4cd81f1d9120fa179baa08ee83
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fashion-service
  labels:
    app: fashion
spec:
  type: ClusterIP
  selector:
    app: fashion
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
